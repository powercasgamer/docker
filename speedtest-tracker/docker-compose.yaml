version: '3.8'
services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    restart: unless-stopped
    container_name: speedtest-tracker
    ports:
      - ${SPEEDTEST_HTTP_PORT:-8080}:80
      - ${SPEEDTEST_HTTPS_PORT:-8443}:443
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION}
      - APP_TIMEZONE=${TZ}
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_SCHEDULE}
      - PRUNE_RESULTS_OLDER_THAN=${PRUNE_RESULTS_OLDER_THAN}
    volumes:
      - ${SPEEDTEST_DATA_PATH:-/opt/docker/speedtest-tracker/data}:/config
      - ${SPEEDTEST_SSL_PATH:-/opt/docker/speedtest-tracker/ssl}:/config/keys