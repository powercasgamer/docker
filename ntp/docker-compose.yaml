version: '3.9'
services:
  ntp:
    build: .
    image: cturra/ntp:latest
    container_name: ntp
    restart: always
    ports:
      - ${NTP_PORT:-123}:123/udp
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - NTP_SERVERS=${NTP_SERVERS}
      - LOG_LEVEL=${LOG_LEVEL:-0}
      - NOCLIENTLOG=${NOCLIENTLOG:-true}
#      - ENABLE_NTS=${ENABLENTS:-false}